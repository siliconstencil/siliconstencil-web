<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLAB | THE_MONOLITH_CORE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; }
        body { 
            background-color: #000; color: #d4d4d8; margin: 0; min-height: 100vh; 
            font-family: 'Share Tech Mono', monospace; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between; padding: 40px;
        }
        .grid-bg { position: fixed; inset: 0; opacity: 0.15; background-image: linear-gradient(#3f3f46 1px, transparent 1px), linear-gradient(90deg, #3f3f46 1px, transparent 1px); background-size: 100px 100px; pointer-events: none; z-index: 0; }
        
        /* CORE RECONSTRUCTION (PIXEL PERFECT) */
        .core-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .core { 
            width: 160px; height: 160px; border-radius: 50%; 
            background: radial-gradient(circle, #FF4500 0%, #8a2500 45%, #000 75%);
            box-shadow: 0 0 60px 15px rgba(255, 69, 0, 0.4);
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(0.96); opacity: 0.8; } 50% { transform: scale(1.04); opacity: 1; box-shadow: 0 0 90px 25px rgba(255, 69, 0, 0.6); } }
        
        .core-ring { position: absolute; width: 280px; height: 280px; border: 1px solid rgba(255, 69, 0, 0.2); border-radius: 50%; animation: rotate 15s linear infinite; border-top: 2px solid #FF4500; top: -60px; left: -60px; }
        .core-ring-inner { position: absolute; width: 220px; height: 220px; border: 1px dashed rgba(255, 69, 0, 0.1); border-radius: 50%; animation: rotate 8s linear infinite reverse; top: -30px; left: -30px; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        header { display: flex; justify-content: space-between; border-left: 4px solid #FF4500; padding-left: 20px; z-index: 10; width: 100%; }
        h1 { color: #FF4500; font-size: 48px; margin: 0; letter-spacing: 0.3em; font-weight: 800; text-shadow: 0 0 15px rgba(255, 69, 0, 0.6); }
        .status-block { text-align: right; font-size: 12px; color: #52525b; line-height: 1.8; letter-spacing: 0.1em; }

        main { text-align: center; z-index: 10; margin-top: 15vh; }
        .terminal-box { 
            display: inline-block; background: rgba(0,0,0,0.85); padding: 15px 30px; border: 1px solid rgba(255,69,0,0.3);
            color: #FF4500; font-size: 18px; letter-spacing: 0.4em; backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        footer { display: flex; justify-content: space-between; border-bottom: 2px solid #1f1f23; padding-bottom: 10px; z-index: 10; font-size: 11px; letter-spacing: 0.2em; color: #3f3f46; font-weight: 700; }
        .blink { animation: blinker 1s steps(2, start) infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="core-container">
        <div class="core-ring"></div>
        <div class="core-ring-inner"></div>
        <div class="core"></div>
    </div>
    <header>
        <div>
            <h1>SLAB</h1>
            <p style="font-size: 11px; color: #52525b; text-transform: uppercase; letter-spacing: 0.4em; margin-top: 5px;">The Lore Archive // Amber Stratum</p>
        </div>
        <div class="status-block">
            <p>STATUS: SEALED</p>
            <p>BIOMETRIC: REQUIRED</p>
        </div>
    </header>
    <main>
        <p style="font-size: 13px; text-transform: uppercase; color: #3f3f46; letter-spacing: 0.6em; margin-bottom: 25px;">Matriarch Core Resonance</p>
        <div class="terminal-box">EXTRACTING BIOLOGICAL ASSETS<span class="blink">...</span></div>
    </main>
    <footer>
        <span>ENCRYPTION: SSS_LOG_3.2.0</span>
        <span style="color: #FF4500;" class="blink">AWAITING ACCESS KEY</span>
    </footer>
</body>
</html>
